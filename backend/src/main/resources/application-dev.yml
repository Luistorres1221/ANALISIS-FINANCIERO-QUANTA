spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.quanta: DEBUG
    org.springframework.web: INFO
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%-5level) %clr(%logger{36}){cyan} - %msg%n"

quanta:
  cors:
    allowed-origins:
      - http://localhost:5173
      - http://localhost:3000
      - http://127.0.0.1:5173
      - https://analisis-financiero-quanta.vercel.app
